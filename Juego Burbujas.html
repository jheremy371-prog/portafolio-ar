<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cazador de Burbujas - Vidas y Corazones</title>
    
    <script src="./mediapipe/camera_utils.js"></script>
    <script src="./mediapipe/hands.js"></script>
    <script src="./mediapipe/drawing_utils.js"></script>
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #2c3e50; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #container { position: relative; width: 100vw; height: 100vh; }
        #videoElement {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; transform: scaleX(-1); opacity: 0.6; z-index: 1;
        }
        #gameCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; pointer-events: none;
        }
        
        /* Panel superior rediseñado */
        #topBar {
            position: absolute; top: 20px; left: 30px; right: 30px; z-index: 3;
            display: flex; justify-content: space-between;
        }
        .ui-box {
            background: rgba(255, 255, 255, 0.95); padding: 15px 30px;
            border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-size: 26px; font-weight: bold; color: #2c3e50;
            border: 3px solid #3498db; display: flex; gap: 20px; align-items: center;
        }
        .highlight { color: #e74c3c; }
        #livesValue { color: #e74c3c; font-size: 30px; letter-spacing: 5px; }
        
        #statusNotification {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 4; color: #f1c40f; font-size: 40px; font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.7); text-align: center;
            pointer-events: none; transition: opacity 0.3s;
        }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 5; color: white; font-size: 24px; background: rgba(0,0,0,0.8);
            padding: 20px; border-radius: 10px;
        }

        /* Pantalla de Game Over */
        #gameOverScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 10; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #gameOverScreen h1 { font-size: 80px; color: #e74c3c; margin: 0; text-shadow: 0 0 20px rgba(231,76,60,0.5); }
        #gameOverScreen p { font-size: 30px; }
        #restartBtn {
            margin-top: 30px; padding: 15px 40px; font-size: 24px; font-weight: bold;
            background: #3498db; color: white; border: none; border-radius: 10px;
            cursor: pointer; pointer-events: auto; transition: 0.2s; box-shadow: 0 5px 15px rgba(52,152,219,0.4);
        }
        #restartBtn:hover { background: #2980b9; transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="container">
        <video id="videoElement" autoplay playsinline></video>
        <canvas id="gameCanvas"></canvas>
        
        <div id="topBar">
            <div class="ui-box">
                <div>Nivel: <span id="levelValue" class="highlight">1</span></div>
                <div>Puntos: <span id="scoreValue" class="highlight">0</span></div>
            </div>
            <div class="ui-box">
                <div>Vidas: <span id="livesValue">❤️❤️❤️</span></div>
            </div>
        </div>

        <div id="statusNotification"></div>
        <div id="loading">Cargando motor offline...</div>

        <div id="gameOverScreen">
            <h1>FIN DEL JUEGO</h1>
            <p>Puntuación Final: <span id="finalScore">0</span></p>
            <p>Nivel Alcanzado: <span id="finalLevel">1</span></p>
            <button id="restartBtn" onclick="resetGame()">Volver a Jugar</button>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('videoElement');
        const canvasElement = document.getElementById('gameCanvas');
        const canvasCtx = canvasElement.getContext('2d');
        const scoreElement = document.getElementById('scoreValue');
        const levelElement = document.getElementById('levelValue');
        const livesElement = document.getElementById('livesValue');
        const statusElement = document.getElementById('statusNotification');
        const loadingElement = document.getElementById('loading');
        const gameOverScreen = document.getElementById('gameOverScreen');

        // Variables del Juego
        let score = 0;
        let level = 1;
        let nextLevelThreshold = 100;
        let maxLives = 5; // Límite máximo de vidas
        let currentLives = 3; // Vidas iniciales
        let isGameOver = false;
        
        let bubbles = [];
        let particles = [];
        let latestHandLandmarks = [];
        let handsActive = false; 
        
        const FINGER_HITBOX_RADIUS = 40; 
        
        function resizeCanvas() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Actualiza el texto en pantalla (Los emojis de corazón)
        function updateLivesUI() {
            livesElement.innerText = '❤️'.repeat(currentLives);
        }

        // Función para dibujar un corazón en el Canvas usando curvas
        function drawHeartShape(ctx, x, y, size, color) {
            ctx.save();
            ctx.translate(x, y);
            ctx.beginPath();
            const topCurveHeight = size * 0.3;
            ctx.moveTo(0, topCurveHeight);
            ctx.bezierCurveTo(0, 0, -size / 2, 0, -size / 2, topCurveHeight);
            ctx.bezierCurveTo(-size / 2, size / 2, 0, size * 0.7, 0, size);
            ctx.bezierCurveTo(0, size * 0.7, size / 2, size / 2, size / 2, topCurveHeight);
            ctx.bezierCurveTo(size / 2, 0, 0, 0, 0, topCurveHeight);
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
            
            // Brillo
            ctx.lineWidth = 3;
            ctx.strokeStyle = 'rgba(255,255,255,0.6)';
            ctx.stroke();
            ctx.restore();
        }

        class Bubble {
            constructor() {
                // 10% de probabilidad de que sea un corazón (power-up)
                this.isHeart = Math.random() < 0.10; 
                
                this.radius = this.isHeart ? 35 : Math.random() * 30 + 40; 
                this.x = Math.random() * (canvasElement.width - this.radius * 2) + this.radius;
                this.y = -this.radius;
                
                // Los corazones caen un poco más rápido para que sea un reto atraparlos
                const baseSpeed = Math.random() * 1.5 + 1; 
                this.speed = this.isHeart ? baseSpeed + 2 : baseSpeed + (level * 0.2); 
                
                this.color = this.isHeart ? '#ff4757' : `hsl(${Math.random() * 360}, 80%, 60%)`;
            }

            draw(ctx) {
                if (this.isHeart) {
                    drawHeartShape(ctx, this.x, this.y - this.radius, this.radius * 2, this.color);
                } else {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                    ctx.lineWidth = 4;
                    ctx.strokeStyle = 'rgba(255,255,255,0.8)';
                    ctx.stroke();
                    
                    ctx.beginPath();
                    ctx.arc(this.x - this.radius * 0.3, this.y - this.radius * 0.3, this.radius * 0.2, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.fill();
                }
            }
            update() { this.y += this.speed; }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.radius = Math.random() * 6 + 3;
                this.speedX = (Math.random() - 0.5) * 12;
                this.speedY = (Math.random() - 0.5) * 12;
                this.color = color;
                this.life = 1.0;
            }
            update() { this.x += this.speedX; this.y += this.speedY; this.life -= 0.04; }
            draw(ctx) {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.globalAlpha = Math.max(0, this.life);
                ctx.fill(); ctx.globalAlpha = 1.0;
            }
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 20; i++) particles.push(new Particle(x, y, color));
        }

        function showMessage(text, duration = 2000) {
            statusElement.innerText = text;
            statusElement.style.opacity = 1;
            if (duration > 0) {
                setTimeout(() => { statusElement.style.opacity = 0; }, duration);
            }
        }

        function triggerGameOver() {
            isGameOver = true;
            document.getElementById('finalScore').innerText = score;
            document.getElementById('finalLevel').innerText = level;
            gameOverScreen.style.display = 'flex';
        }

        // Función enlazada al botón para reiniciar todo
        function resetGame() {
            score = 0;
            level = 1;
            nextLevelThreshold = 100;
            currentLives = 3;
            bubbles = [];
            particles = [];
            isGameOver = false;
            
            scoreElement.innerText = score;
            levelElement.innerText = level;
            updateLivesUI();
            gameOverScreen.style.display = 'none';
        }

        function gameLoop() {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (isGameOver) {
                requestAnimationFrame(gameLoop);
                return; // Pausar todo el dibujo si el juego terminó
            }

            if (handsActive) {
                const spawnRate = 0.015 + (level * 0.002);
                if (Math.random() < spawnRate) bubbles.push(new Bubble());
                statusElement.style.opacity = 0;
            } else {
                showMessage("Pon tus manos frente a la cámara\npara jugar", 0);
            }

            let colliders = [];
            if (latestHandLandmarks && latestHandLandmarks.length > 0) {
                handsActive = true;
                for (const landmarks of latestHandLandmarks) {
                    const tips = [landmarks[8], landmarks[12]]; 
                    
                    tips.forEach(tip => {
                        const px = (1 - tip.x) * canvasElement.width;
                        const py = tip.y * canvasElement.height;
                        colliders.push({x: px, y: py});

                        canvasCtx.beginPath();
                        canvasCtx.arc(px, py, 15, 0, Math.PI * 2);
                        canvasCtx.fillStyle = '#f1c40f';
                        canvasCtx.fill();
                        
                        canvasCtx.beginPath();
                        canvasCtx.arc(px, py, FINGER_HITBOX_RADIUS, 0, Math.PI * 2);
                        canvasCtx.strokeStyle = 'rgba(241, 196, 15, 0.3)';
                        canvasCtx.lineWidth = 2;
                        canvasCtx.stroke();
                    });
                }
            } else {
                handsActive = false;
            }

            for (let i = bubbles.length - 1; i >= 0; i--) {
                let b = bubbles[i];
                b.update();

                let hit = false;
                for (let c of colliders) {
                    const dx = c.x - b.x;
                    const dy = c.y - b.y;
                    if (Math.sqrt(dx * dx + dy * dy) <= b.radius + FINGER_HITBOX_RADIUS) {
                        hit = true; break;
                    }
                }

                if (hit) {
                    createExplosion(b.x, b.y, b.color);
                    
                    // --- LÓGICA DE RECOMPENSA ---
                    if (b.isHeart) {
                        // Si era un corazón y no tenemos vidas al máximo, sumamos una
                        if (currentLives < maxLives) {
                            currentLives++;
                            updateLivesUI();
                            showMessage("+1 VIDA!", 1000);
                        } else {
                            score += 50; // Si ya tienes 5 vidas, da puntos extra
                            scoreElement.innerText = score;
                            showMessage("+50 PUNTOS EXTRA!", 1000);
                        }
                    } else {
                        // Burbuja normal
                        score += 10;
                        scoreElement.innerText = score;
                        if (score >= nextLevelThreshold) {
                            level++;
                            levelElement.innerText = level;
                            nextLevelThreshold += 100; 
                            showMessage(`¡NIVEL ${level}!`);
                        }
                    }
                    
                    bubbles.splice(i, 1);
                    continue; 
                }

                // --- LÓGICA DE PÉRDIDA DE VIDAS ---
                if (b.y > canvasElement.height + b.radius) {
                    // Si perdemos una burbuja NORMAL (perder corazones no castiga)
                    if (!b.isHeart) {
                        currentLives--;
                        updateLivesUI();
                        
                        // Efecto visual de que te dolió perder la burbuja
                        canvasElement.style.background = "rgba(231, 76, 60, 0.2)";
                        setTimeout(() => { canvasElement.style.background = "transparent"; }, 100);

                        if (currentLives <= 0) {
                            triggerGameOver();
                        }
                    }
                    bubbles.splice(i, 1);
                    continue;
                }
                b.draw(canvasCtx);
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update();
                if (p.life <= 0) particles.splice(i, 1);
                else p.draw(canvasCtx);
            }

            requestAnimationFrame(gameLoop);
        }

        // --- INICIALIZACIÓN OFFLINE DE MEDIAPIPE ---
        const hands = new Hands({locateFile: (file) => {
            return `./mediapipe/${file}`;
        }});

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            if (loadingElement.style.display !== 'none') {
                loadingElement.style.display = 'none';
                requestAnimationFrame(gameLoop);
                updateLivesUI(); // Inicializar interfaz
            }
            latestHandLandmarks = results.multiHandLandmarks;
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720
        });
        camera.start();

    </script>
</body>
</html>
