<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Pro Sin Contacto (Silencioso)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap');

        :root {
            --primary: #00ff88;
            --secondary: #00d4ff;
            --swipe-color: #ffaa00;
            --bg-dark: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text: #ffffff;
        }

        body {
            margin: 0; padding: 0; font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark); color: var(--text);
            height: 100vh; width: 100vw; display: flex; flex-direction: column;
            overflow: hidden; background-image: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        /* --- UI Principal --- */
        header {
            text-align: center; padding: 20px; z-index: 10; background: rgba(0,0,0,0.8);
            border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; 
            justify-content: space-between; align-items: center; padding: 15px 50px;
        }
        header h1 { margin: 0; font-size: 1.5rem; font-weight: 300; }
        header h1 span { color: var(--primary); font-weight: 700; }
        
        .instructions { font-size: 14px; opacity: 0.9; max-width: 500px; line-height: 1.4;}
        .instructions span.nav { color: var(--secondary); font-weight: bold;}
        .instructions span.buy { color: var(--primary); font-weight: bold;}
        .instructions span.swipe { color: var(--swipe-color); font-weight: bold;}

        #cart-status {
            background: rgba(255,255,255,0.1); padding: 10px 20px;
            border-radius: 50px; border: 1px solid rgba(255,255,255,0.1);
            font-weight: 700; display: flex; gap: 10px; align-items: center;
        }
        #cart-count { color: var(--primary); font-size: 1.2em; transition: transform 0.3s; }

        /* --- Contenedor del Catálogo --- */
        #catalog-viewport {
            flex: 1; position: relative; overflow: hidden; padding: 40px;
            z-index: 5; display: flex; align-items: center; justify-content: center;
        }

        .catalog-page {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px; width: 100%; max-width: 1200px; position: absolute;
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.4s;
        }

        .catalog-page.active { transform: translateX(0); opacity: 1; pointer-events: all;}
        .catalog-page.past { transform: translateX(-150%); opacity: 0; pointer-events: none;}
        .catalog-page.future { transform: translateX(150%); opacity: 0; pointer-events: none;}

        /* --- Tarjetas Profesionales --- */
        .card {
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px; padding: 25px; display: flex; flex-direction: column;
            align-items: center; transition: all 0.3s ease; backdrop-filter: blur(5px);
        }

        .card.ai-hover {
            border-color: rgba(255, 255, 255, 0.2); transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.06); box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card.ai-buy-select { animation: purchaseFlash 0.6s ease-out forwards; }

        .card-img { font-size: 70px; margin-bottom: 20px; }
        .card-title { font-size: 18px; font-weight: 700; margin: 0; text-align: center;}
        .card-price { font-size: 16px; color: var(--primary); margin-top: 8px; font-weight: 700; }

        /* --- Cursor Dinámico y Feedback Visual --- */
        #ai-cursor {
            position: fixed; width: 25px; height: 25px;
            background: rgba(255,255,255,0.1); border: 2px solid #fff;
            border-radius: 50%; pointer-events: none; z-index: 100;
            transform: translate(-50%, -50%); display: none; 
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
            transition: width 0.2s, height 0.2s, background 0.2s, border-color 0.2s, transform 0.2s, border-radius 0.2s;
        }

        /* 🖐️ Estado: Mano Abierta (Comprar) */
        #ai-cursor.open-hand {
            background: rgba(0, 255, 136, 0.4); border-color: var(--primary);
            transform: translate(-50%, -50%) scale(1.5); border-width: 3px;
        }

        /* ✌️ Estado: Swipe Listo (Índice y Medio Juntos) */
        #ai-cursor.swipe-ready {
            width: 50px; height: 15px; border-radius: 10px;
            background: rgba(255, 170, 0, 0.5); border-color: var(--swipe-color);
            transform: translate(-50%, -50%) scale(1.2); border-width: 3px;
            box-shadow: 0 0 15px rgba(255, 170, 0, 0.4);
        }

        /* --- Indicadores de Paginación --- */
        .pagination-dots {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 10px; z-index: 10;
        }
        .dot { width: 10px; height: 10px; background: rgba(255,255,255,0.2); border-radius: 50%; transition: 0.3s; }
        .dot.active { background: var(--secondary); width: 25px; border-radius: 5px; }

        /* --- Panel de Cámara --- */
        .ai-status-panel {
            position: fixed; bottom: 15px; left: 15px; width: 120px; 
            background: #000; border: 1px solid #222; border-radius: 8px; 
            padding: 5px; z-index: 50; opacity: 0.8;
        }
        .camera-box { width: 100%; height: 70px; position: relative; overflow: hidden; border-radius: 4px;}
        #video, #canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #canvas { position: absolute; top: 0; left: 0; opacity: 0.6; }

        /* --- Animaciones --- */
        @keyframes purchaseFlash {
            0% { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.05); }
            30% { background: var(--primary); border-color: #fff; transform: scale(0.95); }
            100% { background: rgba(0, 255, 136, 0.1); border-color: var(--primary); transform: scale(1); }
        }
    </style>
</head>
<body>

    <header>
        <h1>Vitrina <span>Digital</span> (Silenciosa)</h1>
        <p class="instructions">
            ☝️ <span class="nav">Solo Índice:</span> Navegar por el catálogo.<br>
            ✌️ <span class="swipe">Índice + Medio unidos:</span> Desliza la mano para cambiar página.<br>
            🖐️ <span class="buy">Mano entera abierta:</span> COMPRAR el artículo seleccionado.
        </p>
        <div id="cart-status">🛒 Carrito: <span id="cart-count">0</span></div>
    </header>

    <div id="ai-cursor"></div>
    <div id="catalog-viewport"></div>
    <div class="pagination-dots" id="pagination-dots"></div>

    <div class="ai-status-panel">
        <div class="camera-box">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="canvas"></canvas>
        </div>
    </div>

    <script>
        // --- DATOS DEL CATÁLOGO ---
        const products = [
            { id: 1, title: 'MacBook Pro 14"', price: '$1,999', img: '💻', page: 0 },
            { id: 2, title: 'iPhone 15 Pro', price: '$999', img: '📱', page: 0 },
            { id: 3, title: 'iPad Pro 12.9"', price: '$1,099', img: 'Tablet', page: 0 },
            { id: 4, title: 'Apple Watch Ultra', price: '$799', img: '⌚', page: 1 },
            { id: 5, title: 'AirPods Max', price: '$549', img: '🎧', page: 1 },
            { id: 6, title: 'Magic Keyboard', price: '$299', img: '⌨️', page: 1 },
            { id: 7, title: 'Pro Display XDR', price: '$4,999', img: '🖥️', page: 2 },
            { id: 8, title: 'Apple TV 4K', price: '$129', img: '📺', page: 2 },
        ];
        const TOTAL_PAGES = 3;

        // --- DOM ELEMENTS ---
        const viewport = document.getElementById('catalog-viewport');
        const dotsContainer = document.getElementById('pagination-dots');
        const cartCountEl = document.getElementById('cart-count');
        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const cursorEl = document.getElementById('ai-cursor');

        // --- ESTADO DE LA APLICACIÓN ---
        let appState = {
            currentPage: 0,
            cartItems: 0,
            hoveredCardId: null,
            currentGesture: 'OTHER',
            canSwipe: true,
            swipeStart: { x: null, time: null },
            isPaginating: false // Escudo para ignorar colisiones durante la animación CSS
        };

        // --- INICIALIZACIÓN ---
        function renderCatalog() {
            viewport.innerHTML = ''; dotsContainer.innerHTML = '';
            for (let p = 0; p < TOTAL_PAGES; p++) {
                const pageEl = document.createElement('div');
                pageEl.className = `catalog-page ${p === 0 ? 'active' : 'future'}`;
                pageEl.id = `page-${p}`;
                products.filter(prod => prod.page === p).forEach(prod => {
                    pageEl.innerHTML += `
                        <div class="card" id="product-${prod.id}">
                            <div class="card-img">${prod.img}</div>
                            <h3 class="card-title">${prod.title}</h3>
                            <div class="card-price">${prod.price}</div>
                        </div>
                    `;
                });
                viewport.appendChild(pageEl);
                const dot = document.createElement('div');
                dot.className = `dot ${p === 0 ? 'active' : ''}`;
                dotsContainer.appendChild(dot);
            }
        }
        renderCatalog();

        // --- MEDIAPIPE SETUP ---
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => await hands.send({image: videoElement}),
            width: 320, height: 240
        });
        camera.start();

        // --- LÓGICA PRINCIPAL POR FRAME ---
        function onResults(results) {
            canvasElement.width = videoElement.videoWidth; canvasElement.height = videoElement.videoHeight;
            canvasCtx.save(); canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#ffffff', lineWidth: 1});
                drawLandmarks(canvasCtx, landmarks, {color: '#00ff88', lineWidth: 1, radius: 1});
                
                const indexTip = landmarks[8];
                const palmCenter = landmarks[9];

                // 1. Calcular Coordenadas del Cursor
                let cursorX = (1 - indexTip.x) * window.innerWidth;
                let cursorY = indexTip.y * window.innerHeight;
                
                if(appState.currentGesture === 'SWIPE_READY'){
                    const middleTip = landmarks[12];
                    cursorX = (1 - ((indexTip.x + middleTip.x) / 2)) * window.innerWidth;
                    cursorY = ((indexTip.y + middleTip.y) / 2) * window.innerHeight;
                }
                
                updateVirtualCursor(cursorX, cursorY);

                // 2. Detección Matemática de Gestos
                const newGesture = detectGesture(landmarks);
                handleGestureChange(newGesture, palmCenter);

                // 3. Evaluar Interacciones (Hover / Compra)
                checkInteractions(cursorX, cursorY);

                // 4. Evaluar Paginación (Swipe Absoluto)
                if (appState.currentGesture === 'SWIPE_READY') {
                    handleSwipeDetection(palmCenter);
                }

            } else {
                cursorEl.style.display = 'none';
                clearHoverState();
                appState.currentGesture = 'OTHER';
                appState.swipeStart = { x: null, time: null };
            }
            canvasCtx.restore();
        }

        // --- CONTROLADORES DE INTERFAZ ---
        function updateVirtualCursor(x, y) {
            if (['POINTING', 'OPEN_HAND', 'SWIPE_READY'].includes(appState.currentGesture)) {
                cursorEl.style.display = 'block';
                cursorEl.style.left = `${x}px`;
                cursorEl.style.top = `${y}px`;
            } else {
                cursorEl.style.display = 'none';
            }
        }

        function checkInteractions(x, y) {
            // Escudo: Si la página se está moviendo en una transición CSS, ignorar colisiones
            if (appState.isPaginating) return;

            const activePage = document.querySelector('.catalog-page.active');
            if (!activePage) return;
            const cardsInPage = activePage.querySelectorAll('.card');
            let foundHover = false;

            cardsInPage.forEach(card => {
                const rect = card.getBoundingClientRect();
                if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                    foundHover = true;

                    if (appState.currentGesture === 'POINTING') {
                        if (appState.hoveredCardId !== card.id) {
                            clearHoverState();
                            appState.hoveredCardId = card.id;
                            card.classList.add('ai-hover');
                        }
                    }

                    if (appState.currentGesture === 'OPEN_HAND' && appState.hoveredCardId === card.id && !card.classList.contains('ai-buy-select')) {
                        executePurchase(card);
                    }
                }
            });

            if (!foundHover && appState.hoveredCardId !== null && appState.currentGesture !== 'OPEN_HAND') {
                clearHoverState();
            }
        }

        function executePurchase(card) {
            card.classList.add('ai-buy-select');
            appState.cartItems++;
            cartCountEl.innerText = appState.cartItems;
            
            cartCountEl.style.transform = 'scale(1.5)';
            setTimeout(() => cartCountEl.style.transform = 'scale(1)', 300);

            setTimeout(() => {
                card.classList.remove('ai-buy-select');
                clearHoverState(); 
            }, 1000);
        }

        function clearHoverState() {
            const hovered = document.querySelector('.card.ai-hover');
            if (hovered) hovered.classList.remove('ai-hover');
            appState.hoveredCardId = null;
        }

        // --- MOTOR DE RECONOCIMIENTO DE GESTOS ---
        function detectGesture(landmarks) {
            const wrist = landmarks[0];
            const fingers = [
                { tip: 8, pip: 6 },   // Índice
                { tip: 12, pip: 10 }, // Medio
                { tip: 16, pip: 14 }, // Anular
                { tip: 20, pip: 18 }  // Meñique
            ];

            let extendedFingers = [];
            
            fingers.forEach((finger, index) => {
                const distTip = getDistance(landmarks[finger.tip], wrist);
                const distPip = getDistance(landmarks[finger.pip], wrist);
                if (distTip > distPip * 1.1) extendedFingers.push(index);
            });

            const isIndexOpen = extendedFingers.includes(0);
            const isMiddleOpen = extendedFingers.includes(1);
            const isRingOpen = extendedFingers.includes(2);
            const isPinkyOpen = extendedFingers.includes(3);

            const handScale = getDistance(landmarks[0], landmarks[9]);
            const tipDistance = getDistance(landmarks[8], landmarks[12]);
            const areFingersJoined = tipDistance < (handScale * 0.50); 

            if (isIndexOpen && isMiddleOpen && isRingOpen && isPinkyOpen) {
                return 'OPEN_HAND';
            } 
            else if (isIndexOpen && isMiddleOpen && !isPinkyOpen && areFingersJoined) {
                return 'SWIPE_READY';
            }
            else if (isIndexOpen && !isMiddleOpen && !isRingOpen && !isPinkyOpen) {
                return 'POINTING';
            }

            return 'OTHER';
        }

        function handleGestureChange(newGesture, palmCenter) {
            if (appState.currentGesture !== newGesture) {
                appState.currentGesture = newGesture;
                
                cursorEl.classList.remove('open-hand', 'swipe-ready');
                
                if (newGesture === 'OPEN_HAND') {
                    cursorEl.classList.add('open-hand');
                } 
                else if (newGesture === 'SWIPE_READY') {
                    cursorEl.classList.add('swipe-ready');
                    if (palmCenter) {
                        appState.swipeStart = { x: 1 - palmCenter.x, time: Date.now() };
                    }
                } 
                else {
                    appState.swipeStart = { x: null, time: null };
                }
            }
        }

        // --- SISTEMA DE PAGINACIÓN POR SWIPE ABSOLUTO ---
        function handleSwipeDetection(palmCenter) {
            if (!appState.canSwipe || appState.swipeStart.x === null) return;

            const currentX = 1 - palmCenter.x;
            const deltaX = currentX - appState.swipeStart.x; 
            const deltaTime = Date.now() - appState.swipeStart.time;

            const swipeThreshold = 0.15;
            const maxTimeWindow = 900;

            if (deltaTime > maxTimeWindow) {
                appState.swipeStart = { x: currentX, time: Date.now() };
                return;
            }

            if (Math.abs(deltaX) > swipeThreshold) {
                if (deltaX > 0) changePage('next');
                else changePage('prev');
                
                appState.canSwipe = false;
                appState.swipeStart = { x: null, time: null }; 
                setTimeout(() => { appState.canSwipe = true; }, 1000);
            }
        }

        function changePage(direction) {
            let newPage = appState.currentPage;
            if (direction === 'next' && appState.currentPage < TOTAL_PAGES - 1) newPage++;
            else if (direction === 'prev' && appState.currentPage > 0) newPage--;
            else return;

            // Activar escudo para ignorar interacciones mientras la CSS mueve la página
            appState.isPaginating = true;
            clearHoverState();
            setTimeout(() => { appState.isPaginating = false; }, 600);
            
            const currentPageEl = document.getElementById(`page-${appState.currentPage}`);
            const newPageEl = document.getElementById(`page-${newPage}`);
            const dots = document.querySelectorAll('.dot');

            if (direction === 'next') {
                currentPageEl.className = 'catalog-page past';
                newPageEl.className = 'catalog-page active';
            } else {
                currentPageEl.className = 'catalog-page future';
                newPageEl.className = 'catalog-page active';
            }

            dots[appState.currentPage].classList.remove('active');
            dots[newPage].classList.add('active');

            appState.currentPage = newPage;
        }

        // --- UTILIDAD MATEMÁTICA ---
        function getDistance(p1, p2) {
            return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
        }
    </script>
</body>
</html>
