<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Probador Virtual de Accesorios AR</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils" crossorigin="anonymous"></script>

    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #e74c3c;
            --accent: #f1c40f;
            --dark: #1a252f;
            --light: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--dark);
            color: var(--light);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        header {
            width: 100%;
            background-color: var(--primary);
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 1px;
            color: var(--light);
        }

        /* 🌐 Contenedor Principal de AR */
        #ar-container {
            position: relative;
            width: 640px;
            height: 480px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
            background-color: #000;
            border: 4px solid var(--primary);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        #webcam_feed, #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Vídeo en modo espejo, AHORA NÍTIDO Y A TODO COLOR */
        #webcam_feed, #output_canvas {
            transform: scaleX(-1);
        }

        #output_canvas {
            z-index: 10;
        }

        /* 🎨 Catálogo de E-Commerce */
        #catalog {
            width: 80%;
            max-width: 700px;
            background-color: var(--primary);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .accessory-option {
            background-color: rgba(255,255,255,0.1);
            border: 2px solid transparent;
            border-radius: 5px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
            color: var(--light);
            font-weight: bold;
        }

        .accessory-option:hover {
            background-color: rgba(255,255,255,0.2);
            border-color: var(--accent);
            color: var(--accent);
        }

        .accessory-option.active {
            border-color: var(--accent);
            background-color: var(--accent);
            color: var(--primary);
        }
    </style>
</head>
<body>

<header>
    <h1>PROBADOR VIRTUAL PRO</h1>
</header>

<div id="ar-container">
    <video id="webcam_feed" autoplay playsinline></video>
    <canvas id="output_canvas" width="640" height="480"></canvas>
</div>

<div id="catalog">
    <button class="accessory-option active" data-type="glasses">Gafas de Sol</button>
    <button class="accessory-option" data-type="saiyan">Peluca Super Saiyan</button>
    <button class="accessory-option" data-type="clown">Nariz de Payaso</button>
    <button class="accessory-option" data-type="hat">Sombrero de Caballero</button>
</div>

<script>
    const videoElement = document.getElementById('webcam_feed');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const catalogOptions = document.querySelectorAll('.accessory-option');

    let currentAccessory = 'glasses';

    // -------------------------------------------------------------------------
    // 🎨 DEFINICIÓN DE ACTIVOS (ARCHIVOS LOCALES PNG)
    // Asegúrate de tener estas 4 imágenes en la misma carpeta que este HTML
    // -------------------------------------------------------------------------
    const assets = {
        glasses: {
            img: new Image(),
            anchorPunto: 10,       // Puente de la nariz
            yOffset: 0.01,        // Ajuste vertical
            baseWidthMult: 1.8,  // Multiplicador de escala
            aspect: 2.5          // Proporción Ancho/Alto de TU imagen de gafas
        },
        saiyan: {
            img: new Image(),
            anchorPunto: 10,      // Frente superior
            yOffset: -0.73,      // Ajuste vertical (hacia arriba)
            baseWidthMult: 4.3, 
            aspect: 1.0          // Proporción de la peluca
        },
        clown: {
            img: new Image(),
            anchorPunto: 6,       // Punta de la nariz
            yOffset: -0.05,      // Ajuste vertical fino
            baseWidthMult: 0.5,   
            aspect: 1.0          // Proporción de la nariz redonda
        },
        hat: {
            img: new Image(),
            anchorPunto: 10,      // Frente superior
            yOffset: -0.80,       // Ajuste vertical (hacia arriba)
            baseWidthMult: 2.5,  
            aspect: 1.5          // Proporción del sombrero
        }
    };

    // RUTAS DE TUS ARCHIVOS LOCALES
    assets.glasses.img.src = 'gafas.png';
    assets.saiyan.img.src  = 'peluca.png';
    assets.clown.img.src   = 'nariz.png';
    assets.hat.img.src     = 'sombrero.png';

    // -------------------------------------------------------------------------
    // 🧠 INICIALIZACIÓN DE MEDIAPIPE FACE MESH
    // -------------------------------------------------------------------------
    const faceMesh = new FaceMesh({locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
    }});

    faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: true,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7
    });

    faceMesh.onResults(onResults);

    // Configurar cámara
    const camera = new Camera(videoElement, {
        onFrame: async () => {
            await faceMesh.send({image: videoElement});
        },
        width: 640,
        height: 480
    });
    camera.start();

    // -------------------------------------------------------------------------
    // 🎨 RENDERIZADO Y COMPOSICIÓN
    // -------------------------------------------------------------------------
    function onResults(results) {
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

        if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
            const landmarks = results.multiFaceLandmarks[0];
            
            const sLeft  = { x: landmarks[234].x * canvasElement.width, y: landmarks[234].y * canvasElement.height };
            const sRight = { x: landmarks[454].x * canvasElement.width, y: landmarks[454].y * canvasElement.height };
            
            const activeAsset = assets[currentAccessory];
            const anchorPoint = { x: landmarks[activeAsset.anchorPunto].x * canvasElement.width, y: landmarks[activeAsset.anchorPunto].y * canvasElement.height };

            // Escalado Dinámico
            const facialWidthPx = Math.sqrt(
                Math.pow(sRight.x - sLeft.x, 2) + 
                Math.pow(sRight.y - sLeft.y, 2)
            );
            
            const assetWidth = facialWidthPx * activeAsset.baseWidthMult;
            const assetHeight = assetWidth / activeAsset.aspect; 

            // Rotación (Ángulo Roll sobre Eje Z)
            const dy = sRight.y - sLeft.y;
            const dx = sRight.x - sLeft.x;
            const angleRollRad = Math.atan2(dy, dx); 

            // Aplicar matriz en Canvas
            canvasCtx.save(); 
            canvasCtx.translate(anchorPoint.x, anchorPoint.y);
            canvasCtx.rotate(angleRollRad);

            let refinedYOffset = assetHeight * activeAsset.yOffset;

            // Renderizar la imagen solo si ya cargó correctamente
            if(activeAsset.img.complete && activeAsset.img.naturalHeight !== 0) {
                canvasCtx.drawImage(
                    activeAsset.img,
                    -assetWidth / 2, 
                    refinedYOffset,   
                    assetWidth, 
                    assetHeight
                );
            }

            canvasCtx.restore(); 
        }
        canvasCtx.restore(); 
    }

    // -------------------------------------------------------------------------
    // 🎨 GESTIÓN DE LA INTERFAZ
    // -------------------------------------------------------------------------
    catalogOptions.forEach(option => {
        option.addEventListener('click', () => {
            catalogOptions.forEach(opt => opt.classList.remove('active'));
            option.classList.add('active');
            currentAccessory = option.getAttribute('data-type');
        });
    });

</script>
</body>
</html>
